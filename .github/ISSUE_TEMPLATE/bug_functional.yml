name: "Bug (Functional)"
description: "Report a functional bug with clear repro steps and expected vs actual behavior."
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        **Goal:** Make this reproducible and testable. No root-cause guesses required.
        > **Triage:** The dropdowns below are informational only — they do **not** auto-apply labels. Triage **must** manually apply the matching `area:*` label (e.g., `area:reporting`) and `severity:*` label. Priority and Blocked are set on the Project board, not here.

  - type: dropdown
    id: area
    attributes:
      label: Product area
      description: "Which area owns this? Triage will apply the matching area:* label."
      options:
        - Reporting
        - Tenant Catalog
        - Powertrain
        - AI Insights
        - Communications
        - Survey Engine
        - Unsure
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Prod
        - UAT
        - QA
        - Dev
        - Other (describe below)
    validations:
      required: true

  - type: input
    id: environment_details
    attributes:
      label: Environment details (URL / tenant / build / branch)
      placeholder: "e.g., https://app.example.com, tenant=customer-a, build=1.2.3"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: "Include navigation path, user role, inputs, and any filters/parameters."
      placeholder: |
        1) ...
        2) ...
        3) ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected result
      placeholder: "What should happen?"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual result
      placeholder: "What happened instead?"
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: "Screenshots/video/logs/console output. Add links or paste snippets."
      placeholder: "Attach screenshots or paste logs here."
    validations:
      required: false

  - type: dropdown
    id: severity
    attributes:
      label: Severity (technical impact)
      description: "Triage will apply the matching severity:* label."
      options:
        - Critical (crash/data loss/security)
        - High (major feature broken/no workaround)
        - Medium (workaround exists/partial failure)
        - Low (minor/cosmetic)
    validations:
      required: true

  - type: input
    id: estimate
    attributes:
      label: Estimate (hours)
      description: "Estimated effort in hours to fix this bug."
      placeholder: "e.g., 4"
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Notes / context
      description: "Anything else helpful: scope, frequency, affected users."
    validations:
      required: false