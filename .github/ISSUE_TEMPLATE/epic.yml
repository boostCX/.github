name: "Epic"
description: "A platform capability or large deliverable spanning multiple stories."
type: Epic
title: "[Epic]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        **Epics describe a broad capability or initiative.** Break down into linked stories and tasks after refinement.
        > **Triage:** The area dropdown below is informational only — it does **not** auto-apply a label. Triage **must** manually apply the matching `area:*` label (e.g., `area:reporting`). Priority and Blocked are set on the Project board, not here.

  - type: dropdown
    id: area
    attributes:
      label: Product area
      description: "Which area owns this? Triage will apply the matching area:* label."
      options:
        - Reporting
        - Tenant Catalog
        - Powertrain
        - AI Insights
        - Communications
        - Survey Engine
        - Unsure
    validations:
      required: true

  - type: dropdown
    id: client_specific
    attributes:
      label: Is this client-specific?
      description: "If yes, explain why it cannot be solved via configuration or a reusable platform capability."
      options:
        - "No, platform-wide / reusable"
        - "Yes, single client (must justify below)"
        - Unsure
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: "What problem are you trying to solve and for whom?"
      placeholder: "As a <user>, I need <capability> so that <outcome>."
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Business / user impact
      description: "Who benefits and how? Include any urgency, risk, or downstream cost."
      placeholder: "Who is impacted, how often, and what happens if we do nothing?"
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: "Describe what you want to happen at a high level."
      placeholder: "What should the platform do? What is the intended experience?"
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance criteria
      description: "Bullet list. Must be specific and testable."
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true

  - type: input
    id: estimate
    attributes:
      label: Estimate (hours)
      description: "Optional for epics. Total estimated effort in hours across all child stories/tasks."
      placeholder: "e.g., 40"
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: "Any alternative solutions or approaches considered."
    validations:
      required: false

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies / related links
      description: "Link related issues, PRs, docs, screenshots, or client context."
      placeholder: |
        - Related: #123
        - Depends on: #456
    validations:
      required: false
