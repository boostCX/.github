name: "Investigation (Spike)"
description: "Use for broad or unclear symptoms that need scoped analysis before actionable bugs/tasks can be filed."
title: "[Spike] <symptom> - <area>"
labels:
  - investigation
body:
  - type: markdown
    attributes:
      value: |
        **Use this when:** the symptom is broad or unclear and needs investigation before scoped work can be created.
        **Exit criteria:** this spike produces scoped child bugs or tasks (or a clear WAD/CNR outcome) with measurable baselines.
        > **Triage:** The area dropdown below is informational only — it does **not** auto-apply a label. Triage **must** manually apply the matching `area:*` label (e.g., `area:reporting`). Priority and Blocked are set on the Project board, not here.

  - type: dropdown
    id: area
    attributes:
      label: Product area
      description: "Which area owns this? Triage will apply the matching area:* label."
      options:
        - Reporting
        - Tenant Catalog
        - Powertrain
        - AI Insights
        - Communications
        - Survey Engine
        - Unsure
    validations:
      required: true

  - type: input
    id: scope
    attributes:
      label: Scope (client / tenant / module)
      placeholder: "e.g., IBC / Branch Reporting / Dashboard + Filters"
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Prod
        - UAT
        - QA
        - Dev
        - Other (describe below)
    validations:
      required: true

  - type: textarea
    id: symptoms
    attributes:
      label: What symptoms are being reported?
      placeholder: |
        - Dashboard load slow
        - Filters lag
        - Export timing out
    validations:
      required: true

  - type: textarea
    id: baseline
    attributes:
      label: Baseline measurements (required)
      description: "List at least 2–3 representative actions with measured timings."
      placeholder: |
        1) Dashboard load: 8.4s (Prod)
        2) Apply filter X: 5.1s
        3) Export CSV: timeout at 60s
    validations:
      required: true

  - type: textarea
    id: suspected_areas
    attributes:
      label: Suspected areas (optional)
      description: "No root cause required. Just 'where to look first' if known."
      placeholder: "DB / API / UI / Infra / Unknown"
    validations:
      required: false

  - type: textarea
    id: outcome_required
    attributes:
      label: Required outcome (exit criteria)
      description: "What must this investigation produce?"
      placeholder: |
        - Child bugs for each scoped symptom with measurable benchmarks
        - Before/after comparisons for any fixes
        - Clear comms back to client/internal stakeholders
    validations:
      required: true

  - type: input
    id: estimate
    attributes:
      label: Estimate (hours)
      description: "Estimated time-box for this investigation in hours."
      placeholder: "e.g., 8"
    validations:
      required: true

  - type: input
    id: owner
    attributes:
      label: Owner / lead
      placeholder: "@github-username"
    validations:
      required: true

  - type: textarea
    id: links
    attributes:
      label: Links (tickets, dashboards, logs)
      placeholder: "Link related issues, client escalations, monitoring, etc."
    validations:
      required: false
