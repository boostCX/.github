name: Feature request
description: Suggest an idea or enhancement (platform-first).
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing your idea. boostCX is platform-first: requests should result in reusable capability or configuration where possible.

  - type: dropdown
    id: area
    attributes:
      label: Product Area
      description: Which platform area owns or is most impacted?
      options:
        - Reporting
        - Tenant Catalog
        - Powertrain
        - AI Insights
        - Communications
        - Survey Engine
        - Unsure
    validations:
      required: true

  - type: dropdown
    id: client_specific
    attributes:
      label: Is this client-specific?
      description: If yes, explain why it cannot be solved via configuration or a reusable platform capability.
      options:
        - No, platform-wide / reusable
        - Yes, single client (must justify below)
        - Unsure
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve and for whom?
      placeholder: As a <user>, I need <capability> so that <outcome>.
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Business / user impact
      description: Who benefits and how? Include any urgency, risk, or downstream cost.
      placeholder: Who is impacted, how often, and what happens if we do nothing?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe what you want to happen at a high level.
      placeholder: What should the platform do? What is the intended experience?
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance criteria
      description: Bullet list. Must be specific and testable.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: Any alternative solutions or approaches considered.
    validations:
      required: false

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies / related links
      description: Link related issues, PRs, docs, screenshots, or client context.
      placeholder: |
        - Related: #123
        - Depends on: #456
    validations:
      required: false