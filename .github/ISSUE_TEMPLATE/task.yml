name: "Task"
description: "Internal engineering or operational work (standalone or sub-task of a story)."
type: Task
title: "[Task]: "
labels:
  - task
body:
  - type: markdown
    attributes:
      value: |
        **Use this for internal work:** tech debt, refactors, CI/CD, infrastructure, documentation, or implementation sub-tasks of a story.
        > **Triage:** The area dropdown below is informational only — it does **not** auto-apply a label. Triage **must** manually apply the matching `area:*` label (e.g., `area:reporting`). Priority and Blocked are set on the Project board, not here.

  - type: dropdown
    id: area
    attributes:
      label: Product area
      description: "Which area owns this? Triage will apply the matching area:* label."
      options:
        - Reporting
        - Tenant Catalog
        - Powertrain
        - AI Insights
        - Communications
        - Survey Engine
        - Other (describe below)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: "What needs to be done and why."
      placeholder: "Clear description of the work."
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance criteria
      description: "How do we know this is done?"
      placeholder: |
        - [ ] Condition 1
        - [ ] Condition 2
    validations:
      required: true

  - type: input
    id: estimate
    attributes:
      label: Estimate (hours)
      description: "Estimated effort in hours for this task."
      placeholder: "e.g., 4"
    validations:
      required: true

  - type: input
    id: owner
    attributes:
      label: Owner / assignee
      placeholder: "@github-username"
    validations:
      required: true

  - type: input
    id: parent
    attributes:
      label: Parent issue (if sub-task)
      description: "Link the parent story or epic if this is a child task."
      placeholder: "#123 or URL"
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: Notes / context
      placeholder: "Additional context, links, or constraints."
    validations:
      required: false
