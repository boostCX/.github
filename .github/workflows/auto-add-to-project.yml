name: Auto-add issues to project

on:
  issues:
    types: [opened]

permissions: {}

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/add-to-project@v1.0.2
        with:
          project-url: https://github.com/orgs/boostCX/projects/1
          github-token: ${{ secrets.PROJECT_TOKEN }}
