name: Lint Markdown

on:
  push:
    branches: [main]
    paths: ["**/*.md"]
  pull_request:
    paths: ["**/*.md"]

permissions:
  contents: read

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: "**/*.md"
          config: |
            {
              "default": true,
              "MD013": false,
              "MD024": { "siblings_only": true },
              "MD033": false,
              "MD034": false
            }
